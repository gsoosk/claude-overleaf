name: Sync with Overleaf

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Setup Overleaf remote
        env:
          OVERLEAF_PROJECT_ID: ${{ secrets.OVERLEAF_PROJECT_ID }}
          OVERLEAF_GIT_TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
        run: |
          if ! git remote | grep -q "^overleaf$"; then
            git remote add overleaf "https://git@git.overleaf.com/${OVERLEAF_PROJECT_ID}"
          fi
          git config credential.helper store
          echo "https://git:${OVERLEAF_GIT_TOKEN}@git.overleaf.com" > ~/.git-credentials

      # ── Scheduled / manual: pull Overleaf → GitHub ─────────────────────────
      - name: Pull from Overleaf (scheduled/manual trigger)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git fetch overleaf master

          if [ -n "$(git rev-list HEAD..overleaf/master 2>/dev/null)" ]; then
            # Prefer Overleaf content on conflict (we are pulling *from* Overleaf)
            git merge overleaf/master \
              -m "Auto-sync from Overleaf [skip ci]" \
              --no-edit --allow-unrelated-histories -X theirs

            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
            git push origin "$BRANCH_NAME"
          fi

      # ── On push: merge any Overleaf changes, then push to Overleaf ─────────
      - name: Push to Overleaf (on push event)
        if: github.event_name == 'push'
        run: |
          git fetch overleaf master

          if [ -n "$(git rev-list HEAD..overleaf/master 2>/dev/null)" ]; then
            echo "Overleaf has new commits. Merging before push (GitHub edits take priority on conflict)."

            # -X ours: if the same line was edited in both places, keep GitHub's version.
            # This never blocks — conflicts are always auto-resolved.
            git merge overleaf/master \
              -m "Auto-merge Overleaf changes before push [skip ci]" \
              --no-edit --allow-unrelated-histories -X ours

            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
            git push origin "$BRANCH_NAME"
          fi

          # Always push to Overleaf — merge above guarantees no conflict
          git push overleaf HEAD:master || {
            echo "::error::Push to Overleaf failed. Check credentials and project ID."
            exit 1
          }
